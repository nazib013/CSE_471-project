<!DOCTYPE html>
<html>
<head>
  <title>API Test</title>
</head>
<body>
  <h1>Login Test</h1>
  <input type="email" id="email" value="admin@petshop.com" placeholder="Email">
  <input type="password" id="password" value="admin123" placeholder="Password">
  <button onclick="testLogin()">Login</button>
  <pre id="result"></pre>

  <script>
    async function testLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result = document.getElementById('result');
      
      try {
        result.textContent = 'Testing login...';
        const response = await fetch('http://localhost:5001/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        result.textContent = JSON.stringify(data, null, 2);
        
        if (response.ok) {
          result.textContent += '\n\n✅ LOGIN SUCCESSFUL!';
        } else {
          result.textContent += '\n\n❌ LOGIN FAILED';
        }
      } catch (err) {
        result.textContent = '❌ ERROR: ' + err.message;
      }
    }
  </script>
</body>
</html>
